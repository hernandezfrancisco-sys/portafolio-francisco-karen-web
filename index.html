<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Universitario | Francisco & Karen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>

    <script>
        // 1. INYECCIÓN DE ESTILOS CON FONDO ARTÍSTICO PARA CODE REVIEW
        function injectStyles() {
            const css = `
                :root {
                    --lila-bg: #cbb6d6; 
                    --text-main: #4a3b52;
                    --white-glass: rgba(255, 255, 255, 0.6);
                }
                
                * { margin: 0; padding: 0; box-sizing: border-box; }
                
                body {
                    background-color: var(--lila-bg);
                    color: var(--text-main);
                    min-height: 100vh;
                    overflow-x: hidden;
                    position: relative;
                    transition: background 0.5s ease;
                }

                /* --- FONDO ARTÍSTICO ESTILO IMAGEN (SOLO PARA CODE REVIEW) --- */
                .artistic-bg {
                    position: fixed;
                    top: 0; left: 0; width: 100%; height: 100%;
                    z-index: 0;
                    pointer-events: none;
                    opacity: 0; /* Oculto inicialmente */
                    transition: opacity 1s ease;
                    
                    /* Recreación del patrón abstracto con degradados complejos */
                    background: 
                        radial-gradient(circle at 10% 20%, rgba(255, 180, 180, 0.8) 0%, transparent 40%),
                        radial-gradient(circle at 90% 10%, rgba(255, 220, 180, 0.8) 0%, transparent 40%),
                        radial-gradient(circle at 50% 80%, rgba(200, 180, 255, 0.8) 0%, transparent 50%),
                        radial-gradient(circle at 20% 90%, rgba(255, 150, 200, 0.8) 0%, transparent 40%),
                        linear-gradient(135deg, #fcd5ce 0%, #f8ad9d 25%, #fec89a 50%, #ffb5a7 75%, #e2d1f9 100%);
                    
                    /* Filtro para suavizar y crear el efecto de formas difusas */
                    filter: blur(30px) contrast(1.1);
                    transform: scale(1.1); /* Evita bordes blancos por el blur */
                }

                /* Capa de ruido sutil para textura */
                .noise-overlay {
                    position: fixed;
                    top: 0; left: 0; width: 100%; height: 100%;
                    z-index: 1;
                    pointer-events: none;
                    opacity: 0.03;
                    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
                }

                /* --- CONTENEDOR PRINCIPAL --- */
                .main-wrapper {
                    max-width: 1200px;
                    margin: 0 auto;
                    padding: 2rem;
                    position: relative;
                    z-index: 2;
                    display: flex;
                    flex-direction: column;
                    gap: 4rem;
                }

                /* --- SECCIÓN 1: INTRODUCCIÓN (ESTILO LILA LIMPIO) --- */
                .intro-section {
                    text-align: center;
                    min-height: 90vh;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    padding: 0 1rem;
                }

                h1.name-title {
                    font-family: 'Playfair Display', serif;
                    font-size: clamp(2rem, 5vw, 5rem); 
                    font-weight: 700;
                    margin: 0.5rem 0;
                    line-height: 1.2;
                    color: #fff;
                    text-shadow: 0 4px 15px rgba(74, 59, 82, 0.15);
                    white-space: nowrap; 
                    width: 100%;
                }

                .letter {
                    display: inline-block;
                    animation: enterText 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards, floatWave 3s ease-in-out infinite alternate;
                }
                @keyframes enterText { from { opacity: 0; transform: translateY(40px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
                @keyframes floatWave { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }

                .portfolio-subtitle {
                    font-size: 1rem; color: #5e4b66; text-transform: uppercase; letter-spacing: 0.2em; margin-top: 3rem;
                    font-weight: 600;
                }

                .scroll-indicator {
                    margin-top: 4rem;
                    font-size: 0.9rem;
                    color: #5e4b66;
                    animation: bounceDown 2s infinite;
                    cursor: pointer;
                    opacity: 0.7;
                    background: rgba(255,255,255,0.3);
                    padding: 0.5rem 1.5rem;
                    border-radius: 20px;
                }
                @keyframes bounceDown {
                    0%, 100% { transform: translateY(0); }
                    50% { transform: translateY(10px); }
                }

                /* --- SECCIÓN 2: ANÁLISIS MUSICAL (GLASSMORPHISM SOBRE ARTE) --- */
                .analysis-section {
                    padding-bottom: 4rem;
                    max-width: 900px;
                    margin: 0 auto;
                    width: 100%;
                }

                .analysis-header { text-align: center; margin-bottom: 2rem; }
                .analysis-header h2 { 
                    font-family: 'Playfair Display', serif; 
                    font-size: 2.5rem; 
                    margin-bottom: 0.5rem; 
                    color: #4a3b52;
                }
                
                .song-tag {
                    display: inline-block; 
                    background: rgba(255,255,255,0.8); 
                    padding: 0.5rem 1.5rem;
                    border-radius: 50px; 
                    font-size: 0.9rem; 
                    color: #5e4b66; 
                    font-weight: 700;
                    border: 1px solid rgba(255,255,255,0.9);
                    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
                }

                /* Tarjetas con efecto vidrio más fuerte para contrastar con el fondo colorido */
                .glass-panel {
                    background: rgba(255, 255, 255, 0.45); 
                    backdrop-filter: blur(12px);
                    -webkit-backdrop-filter: blur(12px);
                    border: 1px solid rgba(255, 255, 255, 0.6); 
                    border-radius: 20px;
                    padding: 1.5rem;
                    box-shadow: 0 8px 32px 0 rgba(74, 59, 82, 0.08);
                }

                .intro-text {
                    font-size: 1.1rem; line-height: 1.8; color: #4a3b52;
                    margin-bottom: 2.5rem; text-align: justify;
                }

                .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
                
                .info-card {
                    transition: all 0.3s ease;
                }

                .info-card:hover { 
                    transform: translateY(-5px); 
                    background: rgba(255, 255, 255, 0.65);
                }
                
                .card-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
                .info-card h3 { font-size: 1.4rem; margin-bottom: 1rem; color: #5e4b66; font-weight: 700; }
                .info-card p { font-size: 1rem; line-height: 1.7; color: #4a3b52; }

                .highlight-box {
                    border-left: 4px solid #8e7c99;
                    margin-top: 2rem;
                }
                
                .highlight-box h3 { color: #5e4b66; margin-bottom: 0.5rem; font-size: 1.2rem; }
                .highlight-box p { font-size: 1.05rem; line-height: 1.7; color: #4a3b52; }

                footer { 
                    text-align: center; padding: 2rem; color: #5e4b66; font-size: 0.8rem; 
                    position: relative; z-index: 2;
                }
            `;
            const style = document.createElement('style');
            style.innerHTML = css;
            document.head.appendChild(style);
        }

        // 2. FUNCIONES DE ANIMACIÓN DE TEXTO
        function animateText(element, startDelay) {
            if (!element) return;
            const text = element.innerText;
            element.innerHTML = ''; 
            [...text].forEach((char, index) => {
                const span = document.createElement('span');
                span.className = 'letter';
                span.innerText = char === ' ' ? '\u00A0' : char;
                const delay = startDelay + (index * 0.05);
                span.style.animationDelay = `${delay}s, ${delay + 0.8}s`; 
                element.appendChild(span);
            });
        }

        // 3. LÓGICA DE SCROLL PARA CAMBIAR FONDO
        function handleScroll() {
            const analysisSection = document.getElementById('analysis');
            const artisticBg = document.getElementById('artistic-bg');
            
            if (analysisSection && artisticBg) {
                const rect = analysisSection.getBoundingClientRect();
                const windowHeight = window.innerHeight;
                
                // Si la sección de análisis entra en la pantalla (con un margen de 200px)
                if (rect.top < windowHeight - 100) {
                    artisticBg.style.opacity = '1';
                } else {
                    artisticBg.style.opacity = '0';
                }
            }
        }

        // 4. CONSTRUCTOR DE LA INTERFAZ
        function renderApp() {
            // Fondo artístico (oculto inicialmente)
            const artisticBg = document.createElement('div');
            artisticBg.id = 'artistic-bg';
            artisticBg.className = 'artistic-bg';
            document.body.appendChild(artisticBg);

            // Capa de ruido
            const noiseOverlay = document.createElement('div');
            noiseOverlay.className = 'noise-overlay';
            document.body.appendChild(noiseOverlay);

            // Contenedor principal
            const mainWrapper = document.createElement('div');
            mainWrapper.className = 'main-wrapper';

            // --- PARTE 1: INTRODUCCIÓN ---
            const introSection = document.createElement('div');
            introSection.className = 'intro-section';
            introSection.innerHTML = `
                <h1 class="name-title" id="name1">Francisco Hernández Orozco</h1>
                <h1 class="name-title" id="name2">Karen Yulieth Vivas Castro</h1>
                <p class="portfolio-subtitle">Portafolio (Inserción a la vida universitaria)</p>
                <div class="scroll-indicator" onclick="document.getElementById('analysis').scrollIntoView({behavior: 'smooth'})">
                    Ver Análisis Musical ↓
                </div>
            `;

            // --- PARTE 2: ANÁLISIS MUSICAL ---
            const analysisSection = document.createElement('div');
            analysisSection.id = 'analysis';
            analysisSection.className = 'analysis-section';
            
            analysisSection.innerHTML = `
                <div class="analysis-header">
                    <h2>Análisis Musical: Emoción vs. Sentimiento</h2>
                    <span class="song-tag">🎵 Día de Cobro – Myke Towers</span>
                </div>

                <div class="glass-panel intro-text">
                    La música es una forma de expresión capaz de influir profundamente en nosotros. En este análisis, se explora la diferencia entre la emoción (reacción inmediata al ritmo) y el sentimiento (comprensión reflexiva de la letra) utilizando el tema <strong>Día de Cobro</strong>, una canción de trap latino enfocada en el esfuerzo y la superación personal.
                </div>

                <div class="cards-grid">
                    <div class="glass-panel info-card">
                        <span class="card-icon">⚡</span>
                        <h3>La Emoción (El Ritmo)</h3>
                        <p>Produce energía, adrenalina y motivación automática. La base intensa y acelerada hace que el cuerpo reaccione de inmediato, incluso antes de escuchar la letra. Es lo que podemos llamar el <strong>"hardware reaccionando"</strong>.</p>
                    </div>

                    <div class="glass-panel info-card">
                        <span class="card-icon">💭</span>
                        <h3>El Sentimiento (La Letra)</h3>
                        <p>Transmite ambición, perseverancia y ganas de progresar. Al comprender el mensaje sobre el sacrificio que hay detrás del éxito, el oyente lo relaciona con sus propias metas. Este proceso representa el <strong>"software procesando el dato"</strong>.</p>
                    </div>
                </div>

                <div class="glass-panel highlight-box">
                    <h3>✨ Persistencia del Mensaje</h3>
                    <p>Es de alta persistencia. La combinación de un ritmo enérgico con una letra reflexiva hace que el mensaje no sea pasajero; se queda en la mente del oyente, impulsándolo a pensar en su propio futuro.</p>
                </div>
            `;

            // Unir todo
            mainWrapper.appendChild(introSection);
            mainWrapper.appendChild(analysisSection);
            document.body.appendChild(mainWrapper);

            const footer = document.createElement('footer');
            footer.innerText = "© 2026 Portafolio Académico | Francisco & Karen";
            document.body.appendChild(footer);

            // Iniciar animaciones
            setTimeout(() => {
                animateText(document.getElementById('name1'), 0.2);
                animateText(document.getElementById('name2'), 1.8);
            }, 100);

            // Listener para el scroll
            window.addEventListener('scroll', handleScroll);
        }

        document.addEventListener('DOMContentLoaded', () => {
            injectStyles();
            renderApp();
        });
    </script>

</body>
</html>
